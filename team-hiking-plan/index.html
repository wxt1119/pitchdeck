<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>6月团队徒步团建互动方案</title><style>:root{--ink:#17251e;--muted:#607066;--line:#dce4de;--bg:#f5f7f3;--green:#1f7a56;--gold:#bd802d;--red:#a94743}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}a{color:var(--green);font-weight:800;text-decoration:none}a:hover{text-decoration:underline}header{background:#10291f;color:white;padding:28px 5vw 18px}h1{margin:0 0 10px;font-size:clamp(28px,4vw,46px)}h2{margin:0 0 12px}p{line-height:1.65}.sub{max-width:980px;color:#dce8df}main{padding:22px 5vw 52px}.notice,.grid,.poll{display:grid;gap:16px}.notice{grid-template-columns:1.1fr .9fr}.grid,.poll{grid-template-columns:repeat(3,minmax(0,1fr))}.panel,.card{background:white;border:1px solid var(--line);border-radius:8px;padding:18px;box-shadow:0 8px 24px rgba(27,48,36,.06)}.card{padding:0;overflow:hidden}.hero{width:100%;aspect-ratio:16/10;object-fit:cover;background:#dfe7e1}.body{padding:16px}.badges{display:flex;gap:8px;flex-wrap:wrap}.badge{border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px;background:#f7faf8}.gold{color:#784d12;background:#fff6e3;border-color:#d8b16b}.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}.meta div{border:1px solid var(--line);border-radius:6px;padding:8px;background:#f7faf8}.note{color:var(--muted);font-size:13px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 12px}button{border:0;border-radius:7px;background:var(--ink);color:white;padding:10px 14px;font-weight:800;cursor:pointer}button.active{background:var(--green)}button.voted{background:var(--gold)}.section{display:none}.section.active{display:block}table{width:100%;border-collapse:collapse;background:white;border:1px solid var(--line)}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#eef4ef}.pros{color:var(--green)}.cons{color:var(--red)}.bar{height:10px;background:#e8eee9;border-radius:99px;overflow:hidden;margin:10px 0}.fill{height:100%;background:var(--green)}.commentbox{display:grid;grid-template-columns:190px 1fr auto;gap:10px;margin:16px 0}input,select{border:1px solid var(--line);border-radius:7px;padding:10px;font:inherit}.comment{border-top:1px solid var(--line);padding:12px 0}.warn{border-left:4px solid var(--gold);background:#fff8e8;border-radius:6px;padding:12px}@media(max-width:900px){.notice,.grid,.poll,.commentbox{grid-template-columns:1fr}}</style></head><body><header><h1>6月团队徒步团建互动方案</h1><div class="sub">40人左右，15公里以上，稍有强度但照顾团队平均水平；优先有水线/溯溪。已修复：图片改用公开可访问的真实路线/景区来源；小红书链接改为具体笔记详情路径。</div></header><main><div class="notice"><section class="panel"><h2>小黑板</h2><p><b>主推：</b>水泉沟-水长城延展线。它最贴近“15km+、有水线、有夏季记忆点”，但必须让 vendor 提供实测轨迹、退出点和雨后替代路线。</p><p class="warn">小红书网页端可能要求登录或跳 App；这里保留具体笔记详情链接，手机打开通常更稳定。</p></section><section class="panel"><h2>推荐结论</h2><p id="rec"></p><button id="pick">选中推荐方案</button></section></div><section class="grid" id="cards"></section><nav class="tabs"><button class="active" data-tab="compare">方案比较</button><button data-tab="sources">链接与图片来源</button><button data-tab="community">投票评论</button><button data-tab="vendor">Vendor 问题</button></nav><section class="section active" id="compare"></section><section class="section" id="sources"></section><section class="section" id="community"></section><section class="section" id="vendor"></section></main><script>const fallback='https://r1.visitbeijing.com.cn/vbj-s/2019/0329/20190329112628937.jpg';const routes=[{id:'shuiquan',name:'水泉沟-水长城延展线',fit:'最贴合需求',level:'B',distance:'15km左右',duration:'5-6h',tags:['有水线','夏季友好','需定制延展'],img:'https://img-rs.huanqiucdn.cn/dp/api/files/image/598472899a06b72c480b4a808cf2d872c5.jpg',pros:['有水、有峡谷、有长城记忆点','团队照片和分组任务好设计','一日或两天一晚都能组织'],cons:['常规公开线不一定到15km','雨后湿滑和水量变化风险最高','40人需要更强向导和收队配置'],ask:'15km实测轨迹、8-10km退出点、雨后替代线、向导配比、涉水安全边界。',links:[['小红书：有山有水还刺激','https://www.xiaohongshu.com/discovery/item/69dbb13c000000021b00ae6c'],['小红书：小众绝美峡谷溯溪','https://www.xiaohongshu.com/discovery/item/6a008833000000003700ecf7'],['Beijing Hikers: Shuiquan Canyon','https://www.beijinghikers.com/hike-in-beijing/view/1198/shuiquan-canyon/'],['北京旅游网：黄花城水长城','https://english.visitbeijing.com.cn/article/47OOqCCVYxJ']]},{id:'chongli',name:'崇礼玉石梁/高山草甸定制线',fit:'整体更稳',level:'B+',distance:'15km左右',duration:'5-6.5h',tags:['两天一晚','高山草甸','避暑'],img:'https://img-rs.huanqiucdn.cn/dp/api/files/image/44b8d644cf4448c1b5c154946c20f6afc5.jpg',pros:['高山草甸辨识度强','强度更容易拉到15km','涉水风险低，完成率更好控'],cons:['没有溯溪体验','车程和住宿组织成本更高','天气突变需要装备要求'],ask:'确认草甸花期、风雨备选、住宿车程、海拔温差装备提醒、15km环线轨迹。',links:[['小红书：玉石梁15公里路书','https://www.xiaohongshu.com/discovery/item/6a06cf1f0000000007020d44'],['8264：玉石梁、汗海梁纪实','https://www.8264.com/youji/5749426.html'],['两步路：崇礼三梁路线','https://www.2bulu.com/event/d-101092.htm']]},{id:'baihujian',name:'白虎涧-凤凰岭方向',fit:'最照顾平均水平',level:'B-',distance:'15km可定制',duration:'4.5-6h',tags:['更稳妥','北京近郊','退出方便'],img:'https://r1.visitbeijing.com.cn/vbj-s/2019/0329/20190329112628937.jpg',pros:['距离近，组织成本低','退出和补给容易','不强依赖水量'],cons:['记忆点弱于水泉沟','15km需要串联设计','部分景区化路段野趣较弱'],ask:'确认景区/非景区边界、15km串联方式、集合停车、非徒步同学替代活动。',links:[['小红书：白虎涧/凤凰岭穿越','https://www.xiaohongshu.com/discovery/item/69ecb5a40000000035028a68'],['北京旅游网：白虎涧图库','https://s.visitbeijing.com.cn/gallery/10494'],['北京市园林绿化局：白虎涧森林公园','https://yllhj.beijing.gov.cn/ggfw/bjsggml/zrlgy/zrlgy2/202206/t20220620_2746810.shtml']]}];const state=JSON.parse(localStorage.getItem('team-hiking-v3')||'{"votes":{},"mine":[],"comments":[]}');const $=id=>document.getElementById(id);function save(){localStorage.setItem('team-hiking-v3',JSON.stringify(state))}function vote(id){const i=state.mine.indexOf(id);if(i>=0){state.mine.splice(i,1);state.votes[id]=Math.max(0,(state.votes[id]||0)-1)}else{state.mine.push(id);state.votes[id]=(state.votes[id]||0)+1}save();render();document.querySelector('[data-tab="community"]').click()}function renderCards(){$('cards').innerHTML=routes.map(r=>`<article class="card"><img class="hero" src="${r.img}" onerror="this.src=fallback" alt="${r.name}"><div class="body"><h2>${r.name}</h2><div class="badges"><span class="badge gold">${r.fit}</span>${r.tags.map(t=>`<span class="badge">${t}</span>`).join('')}</div><div class="meta"><div><span class="note">距离</span><b>${r.distance}</b></div><div><span class="note">难度</span><b>${r.level}</b></div><div><span class="note">时长</span><b>${r.duration}</b></div></div><p>${r.pros[0]}</p><button data-vote="${r.id}" class="${state.mine.includes(r.id)?'voted':''}">${state.mine.includes(r.id)?'取消投票':'投一票'}</button> <a href="${r.links[0][1]}" target="_blank" rel="noreferrer">打开来源</a></div></article>`).join('')}function renderCompare(){$('compare').innerHTML=`<table><thead><tr><th>路线</th><th>优势</th><th>短板/风险</th><th>判断</th></tr></thead><tbody>${routes.map(r=>`<tr><td><b>${r.name}</b><br><span class="note">${r.distance} · ${r.duration} · ${r.level}</span></td><td class="pros">${r.pros.map(x=>'• '+x).join('<br>')}</td><td class="cons">${r.cons.map(x=>'• '+x).join('<br>')}</td><td>${r.id==='shuiquan'?'主推，但必须控风险':r.id==='chongli'?'强备选，适合两天一晚':'保底稳，记忆点较弱'}</td></tr>`).join('')}</tbody></table>`}function renderSources(){$('sources').innerHTML=routes.map(r=>`<div class="panel"><h2>${r.name}</h2><p class="note">图片为真实路线/景区公开来源；小红书为具体笔记详情链接。</p>${r.links.map(l=>`<p><a href="${l[1]}" target="_blank" rel="noreferrer">${l[0]}</a></p>`).join('')}</div>`).join('')}function renderCommunity(){const total=Object.values(state.votes).reduce((a,b)=>a+b,0);$('community').innerHTML=`<div class="panel"><h2>投票结果</h2><p class="note">可多选；同一浏览器里每条路线最多一票，再点可取消。</p><div class="poll">${routes.map(r=>{const c=state.votes[r.id]||0,p=total?Math.round(c/total*100):0;return `<div class="panel"><h3>${r.name}</h3><div class="bar"><div class="fill" style="width:${p}%"></div></div><b>${c}票 · ${p}%</b><p><button data-vote="${r.id}" class="${state.mine.includes(r.id)?'voted':''}">${state.mine.includes(r.id)?'取消投票':'投一票'}</button></p></div>`}).join('')}</div><div class="commentbox"><select id="routePick">${routes.map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}</select><input id="commentText" placeholder="写下偏好或顾虑"><button id="addComment">发布评论</button></div><div>${state.comments.map(c=>`<div class="comment"><b>${routes.find(r=>r.id===c.route)?.name||'路线'}</b><p>${String(c.text).replace(/[<>&]/g,s=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[s]))}</p><span class="note">${c.time}</span></div>`).join('')||'<p class="note">还没有评论。</p>'}</div></div>`;document.getElementById('addComment').onclick=()=>{const text=document.getElementById('commentText').value.trim();if(!text)return;state.comments.unshift({route:document.getElementById('routePick').value,text,time:new Date().toLocaleString('zh-CN',{hour12:false})});save();render();document.querySelector('[data-tab="community"]').click()}}function renderVendor(){$('vendor').innerHTML=`<div class="panel"><h2>给 vendor 的确认项</h2><ul>${routes.map(r=>`<li><b>${r.name}：</b>${r.ask}</li>`).join('')}</ul><p class="warn">最终执行前仍要 vendor 给 GPX/两步路轨迹、天气预案、保险、向导配比和应急撤离点。</p></div>`}function render(){$('rec').textContent='主推水泉沟-水长城延展线；天气或水线风险不可控时切到崇礼高山草甸；团队体能压力大则用白虎涧保底。';renderCards();renderCompare();renderSources();renderCommunity();renderVendor();document.querySelectorAll('[data-vote]').forEach(b=>b.onclick=()=>vote(b.dataset.vote))}document.querySelectorAll('[data-tab]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b===btn));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===btn.dataset.tab))});document.getElementById('pick').onclick=()=>vote('shuiquan');render();</script></body></html>
