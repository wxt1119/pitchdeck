    :root {
      --ink: #17211c;
      --muted: #627069;
      --line: #d9e3dd;
      --paper: #f7faf6;
      --panel: #ffffff;
      --green: #28734d;
      --teal: #0f766e;
      --blue: #315f96;
      --amber: #a7651b;
      --red: #a43e47;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }
    header {
      padding: 28px clamp(18px, 5vw, 56px) 18px;
      background: linear-gradient(180deg, #e9f5ed, #f7faf6);
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4.5vw, 48px);
      letter-spacing: 0;
    }
    h2 { margin: 0 0 10px; font-size: 20px; letter-spacing: 0; }
    h3 { margin: 0 0 8px; font-size: 16px; letter-spacing: 0; }
    p { line-height: 1.6; }
    main { padding: 18px clamp(18px, 5vw, 56px) 44px; }
    .subhead {
      max-width: 980px;
      color: var(--muted);
      line-height: 1.7;
    }
    .bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 12px;
      min-height: 38px;
      cursor: pointer;
      font: inherit;
    }
    button.active {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .68;
      background: #edf4ef;
    }
    .notice {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(260px, .85fr);
      gap: 14px;
      margin: 18px 0;
    }
    .panel, .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .recommend {
      border-left: 5px solid var(--green);
      background: #f0f8f2;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 14px;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cover {
      min-height: 150px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #e4eee8;
      position: relative;
    }
    .cover svg {
      display: block;
      width: 100%;
      height: 150px;
    }
    .cover img {
      display: block;
      width: 100%;
      height: 210px;
      object-fit: cover;
    }
    .gallery-nav {
      position: absolute;
      top: 88px;
      width: 32px;
      height: 32px;
      min-height: 32px;
      border-radius: 999px;
      border-color: rgba(255,255,255,.75);
      background: rgba(255,255,255,.85);
      padding: 0;
      display: grid;
      place-items: center;
    }
    .gallery-nav.prev { left: 8px; }
    .gallery-nav.next { right: 8px; }
    .gallery-count {
      position: absolute;
      top: 8px;
      right: 8px;
      border-radius: 999px;
      background: rgba(23, 33, 28, .74);
      color: white;
      padding: 4px 8px;
      font-size: 12px;
    }
    .caption {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      padding: 8px 10px;
      background: #f7faf6;
      border-top: 1px solid var(--line);
    }
    .card.selected {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(40, 115, 77, .12);
    }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 12px;
      color: #31423a;
      background: #edf4ef;
      border: 1px solid #dbe8df;
      border-radius: 999px;
      padding: 4px 8px;
    }
    .tag.water { background: #e7f5f3; color: var(--teal); }
    .tag.challenge { background: #fff3df; color: var(--amber); }
    .tag.source { background: #f7ecf0; color: #9d3655; }
    .tag.difficulty { background: #eaf0fa; color: var(--blue); }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .metric {
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .metric b { display: block; font-size: 17px; }
    .metric span { color: var(--muted); font-size: 12px; }
    details {
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    summary { cursor: pointer; font-weight: 650; }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 20px 0 12px;
    }
    .section { display: none; }
    .section.active { display: block; }
    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      line-height: 1.5;
    }
    th { background: #edf4ef; }
    .timeline {
      display: grid;
      gap: 10px;
    }
    .event {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      border-left: 3px solid var(--blue);
      padding: 10px 12px;
      background: var(--panel);
      border-radius: 0 8px 8px 0;
    }
    .score {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      max-width: 140px;
    }
    .dot {
      height: 8px;
      border-radius: 999px;
      background: #d7ded9;
    }
    .dot.on { background: var(--green); }
    .note {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }
    .split {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }
    a {
      color: var(--blue);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    .sources {
      display: grid;
      gap: 8px;
    }
    .source-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 10px;
      padding: 9px 0;
      border-top: 1px solid var(--line);
    }
    .pending {
      color: var(--muted);
    }
    .poll {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .vote-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--panel);
    }
    .vote-card.voted {
      border-color: var(--green);
      background: #f0f8f2;
    }
    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #e2e9e5;
      overflow: hidden;
      margin: 8px 0;
    }
    .bar-fill {
      height: 100%;
      background: var(--green);
      width: 0;
    }
    .comment-box {
      display: grid;
      grid-template-columns: minmax(120px, .4fr) minmax(220px, 1fr) auto;
      gap: 8px;
      margin: 14px 0;
    }
    input, select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      min-height: 38px;
      font: inherit;
      background: var(--panel);
    }
    .comment {
      border-top: 1px solid var(--line);
      padding: 10px 0;
    }
    .empty {
      color: var(--muted);
      padding: 12px;
      background: #f2f6f3;
      border-radius: 8px;
    }
    .error {
      border: 1px solid #efc6c8;
      background: #fff5f5;
      color: #7f1d1d;
      border-radius: 8px;
      padding: 12px;
      margin: 12px 0;
    }
    ul { padding-left: 20px; }
    @media (max-width: 760px) {
      .notice { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr; }
      .event { grid-template-columns: 1fr; }
      .comment-box { grid-template-columns: 1fr; }
    }
  </style>
</head>

          pros: ["近郊组织确定性最高", "你们团队历史上已有白虎涧经验", "餐饮、民宿、夜间活动容易串起来"],

            ["小红书笔记", "沐沐：每周一山 今天是穿越凤凰岭和白虎涧（05-02，57赞，29藏，30评）", "https://www.xiaohongshu.com/explore/69ecb5a40000000035028a68"],

      timeline: [

        ["Day2 16:30", "大巴返程或晚餐后返程"]
      ],
      vendorQuestions: [
        "15km主线的轨迹、爬升、路面类型、预计耗时分别是多少？",
        "哪些路段是真正涉水/溯溪？6月水量是否稳定？雨后是否封闭或不建议通行？",
        "40人团队配置几名向导？是否有 lead guide、sweep guide 和急救负责人？",
        "8-10km退出点在哪里？车辆能否接驳？等待的同学在哪里休息？",
        "是否包含保险、急救包、对讲机、能量补给、饮用水？",
        "如果下雨或水量异常，替代路线和替代活动是什么？"
      ],
      risks: [
        "平均水平团队不能只设计15km主线，必须有退出线。",
        "溯溪/溪谷段雨后湿滑，活动前48小时需要复核天气和水量。",
        "40人队伍容易拉长，建议每10-12人一个小组，首尾向导明确。",
        "需要提前收集身体状况、是否恐高/膝盖旧伤/是否愿意涉水。",
        "非徒步同学可安排水长城轻游、民宿休息、桌游或咖啡/农家体验。"

    };

    const storageKey = "june-hiking-proposal-votes-comments-v2";
    function readSavedState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey) || "{\"votes\":{},\"myVotes\":[],\"comments\":[]}");
      } catch (error) {
        return { votes: {}, myVotes: [], comments: [] };
      }
    }
    const saved = readSavedState();
    const state = { filter: "全部", selected: "shuiquan", votes: saved.votes || {}, myVotes: saved.myVotes || [], comments: saved.comments || [], gallery: {} };
    const el = (id) => document.getElementById(id);
    const score = (n) => `<div class="score">${[1,2,3,4,5].map(i => `<span class="dot ${i <= n ? "on" : ""}"></span>`).join("")}</div>`;
    const save = () => {
      try {
        localStorage.setItem(storageKey, JSON.stringify({ votes: state.votes, myVotes: state.myVotes, comments: state.comments }));
      } catch (error) {
        console.warn("Local vote/comment storage is unavailable in this browser context.");
      }
    };
    const sourceLink = ([kind, label, href]) => `<div class="source-row"><b>${kind}</b>${href ? `<a href="${href}" target="_blank" rel="noreferrer">${label}</a>` : `<span class="pending">${label}</span>`}</div>`;
    const hasVoted = (id) => state.myVotes.includes(id);
    function voteFor(id) {
      if (hasVoted(id)) {
        state.votes[id] = Math.max(0, (state.votes[id] || 0) - 1);
        state.myVotes = state.myVotes.filter((voteId) => voteId !== id);
      } else {
        state.votes[id] = (state.votes[id] || 0) + 1;
        state.myVotes.push(id);
      }
      save();
      render();
    }
    const escapeHtml = (value) => String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[char]));
    const visual = (type, title) => {
      const palette = {
        water: ["#d8f0ee", "#73b8ad", "#2f7d57", "溪谷水线"],
        meadow: ["#eaf4dc", "#a8c96b", "#315f96", "高山草甸"],
        ridge: ["#eef1e7", "#b7a77a", "#28734d", "近郊山线"]
      }[type] || ["#edf4ef", "#9fb8a8", "#28734d", "路线图"];
      return `<svg viewBox="0 0 640 300" role="img" aria-label="${title}视觉示意图">
        <rect width="640" height="300" fill="${palette[0]}"></rect>
        <path d="M0 230 C90 180 130 205 200 150 C270 95 350 125 420 78 C510 18 575 72 640 42 L640 300 L0 300 Z" fill="${palette[1]}" opacity=".72"></path>
        <path d="M0 252 C110 210 185 238 270 185 C365 126 447 170 540 104 C585 72 615 70 640 76 L640 300 L0 300 Z" fill="${palette[2]}" opacity=".38"></path>
        ${type === "water" ? "<path d='M40 238 C125 215 160 242 238 208 C315 175 360 196 430 160 C505 122 555 135 610 104' fill='none' stroke='#e9ffff' stroke-width='16' opacity='.9'></path><path d='M40 238 C125 215 160 242 238 208 C315 175 360 196 430 160 C505 122 555 135 610 104' fill='none' stroke='#2992a0' stroke-width='5'></path>" : ""}
        <path d="M70 210 C160 178 222 198 310 154 C405 106 492 120 582 78" fill="none" stroke="#fff" stroke-width="6" stroke-dasharray="12 12"></path>
        <circle cx="70" cy="210" r="11" fill="#fff"></circle>
        <circle cx="582" cy="78" r="11" fill="#fff"></circle>
        <text x="28" y="42" fill="#17211c" font-size="24" font-weight="700">${title}</text>
        <text x="28" y="74" fill="#627069" font-size="16">${palette[3]} · 图片位待替换为小红书/实拍素材</text>
      </svg>`;
    };

    function visibleRoutes() {
      return data.routes.filter(route => state.filter === "全部" || route.tags.includes(state.filter));
    }

    function renderFilters() {
      el("filters").innerHTML = data.filters.map(filter => `<button class="${filter === state.filter ? "active" : ""}" data-filter="${filter}">${filter}</button>`).join("");
      document.querySelectorAll("[data-filter]").forEach(button => {
        button.addEventListener("click", () => {
          state.filter = button.dataset.filter;
          render();
        });
      });
    }

    function renderCards() {
      el("cards").innerHTML = visibleRoutes().map(route => `
        <article class="card ${route.id === state.selected ? "selected" : ""}">
          ${renderGallery(route)}
          <h2>${route.name}</h2>
          <div class="tags">
            <span class="tag">${route.fit}</span>
            <span class="tag difficulty">难度 ${route.level} · ${route.difficulty}</span>
            <span class="tag source">小红书真实数据</span>
            ${route.tags.map(tag => `<span class="tag ${tag === "有水线" ? "water" : tag === "挑战感" ? "challenge" : ""}">${tag}</span>`).join("")}
          </div>
          <p>${route.why}</p>
          <div class="metrics">
            <div class="metric"><b>${route.distance}</b><span>距离</span></div>
            <div class="metric"><b>${route.climb}</b><span>爬升</span></div>
            <div class="metric"><b>${route.duration}</b><span>时长</span></div>
          </div>
          <details open><summary>需要注意</summary><p>${route.watch}</p></details>
          <details><summary>小红书证据</summary><p>${route.xhsEvidence}</p></details>
          <details><summary>问 vendor</summary><p>${route.ask}</p></details>
          <details><summary>来源链接</summary><div class="sources">${route.sources.map(sourceLink).join("")}</div></details>
          <a href="${route.primaryLink}" target="_blank" rel="noreferrer">打开路线推荐来源</a>
          <button data-vote="${route.id}">${hasVoted(route.id) ? "取消投票" : "投票支持"} · ${state.votes[route.id] || 0}</button>
          <button data-pick="${route.id}">${route.id === state.selected ? "已选中" : "选这个方案"}</button>
        </article>
      `).join("");
      document.querySelectorAll("[data-pick]").forEach(button => {
        button.addEventListener("click", () => {
          state.selected = button.dataset.pick;
          render();
        });
      });
      document.querySelectorAll("[data-vote]").forEach(button => {
        button.addEventListener("click", () => {
          voteFor(button.dataset.vote);
          document.querySelector("[data-tab='community']").click();
        });
      });
      document.querySelectorAll("[data-gallery]").forEach(button => {
        button.addEventListener("click", () => {
          const route = data.routes.find(item => item.id === button.dataset.gallery);
          const current = state.gallery[route.id] || 0;
          const delta = Number(button.dataset.delta);
          state.gallery[route.id] = (current + delta + route.images.length) % route.images.length;
          render();
        });
      });
    }

    function renderGallery(route) {
      const index = state.gallery[route.id] || 0;
      const image = route.images[index];
      return `<div class="cover">
        <img src="${image.src}" alt="${route.name}真实来源图片 ${index + 1}">
        <span class="gallery-count">${index + 1}/${route.images.length}</span>
        <button class="gallery-nav prev" data-gallery="${route.id}" data-delta="-1" aria-label="上一张">‹</button>
        <button class="gallery-nav next" data-gallery="${route.id}" data-delta="1" aria-label="下一张">›</button>
        <div class="caption">${image.credit}</div>
      </div>`;
    }

    function renderCompare() {
      el("compare").innerHTML = `
        <table>
          <thead><tr><th>方案</th><th>最适合</th><th>优势</th><th>短板</th><th>判断</th></tr></thead>
          <tbody>
            ${data.routes.map(route => `
              <tr>
                <td><b>${route.name}</b><div class="note">难度 ${route.level} · ${route.difficulty}</div></td>
                <td>${route.fit}<div class="note">水线 ${score(route.score.water)} 组织 ${score(route.score.logistics)}</div></td>
                <td><ul>${route.pros.map(item => `<li>${item}</li>`).join("")}</ul></td>
                <td><ul>${route.cons.map(item => `<li>${item}</li>`).join("")}</ul></td>
                <td><b>${route.verdict}</b></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
        <p class="note">评分是方案判断，不是路线事实；正式执行前需要 vendor 提供当季实测信息。</p>`;
    }

    function renderTimeline() {
      el("timeline").innerHTML = `<div class="timeline">${data.timeline.map(([time, text]) => `<div class="event"><b>${time}</b><span>${text}</span></div>`).join("")}</div>`;
    }

    function renderLists() {
      el("vendor").innerHTML = `<div class="panel"><h2>发给 vendor 的问题清单</h2><ul>${data.vendorQuestions.map(item => `<li>${item}</li>`).join("")}</ul></div>`;
      el("risk").innerHTML = `<div class="split"><div class="panel"><h2>风险控制</h2><ul>${data.risks.map(item => `<li>${item}</li>`).join("")}</ul></div><div class="panel"><h2>结论</h2><p>如果你们想要“有水、15km、有强度但别太难”，水泉沟-水长城延展线最值得推进；如果更看重稳和完成率，崇礼高山草甸会更保险。</p></div></div>`;
      el("sources").innerHTML = `<div class="panel"><h2>来源优先级</h2><p>第一优先级：Just One API 返回的小红书真实笔记，用来判断图片质感、季节水量、拥挤程度、体感难度和踩坑反馈。第二优先级：团队历史飞书方案，用来匹配你们的 QBR 节奏和组织偏好。第三优先级：公开路线/户外机构/官方文旅页面，用来校验距离、爬升、路况和风险。</p><table><thead><tr><th>方案</th><th>小红书状态</th><th>当前可点击来源</th></tr></thead><tbody>${data.routes.map(route => `<tr><td><b>${route.name}</b></td><td>${route.xhsStatus}</td><td>${route.sources.filter(([, , href]) => href).map(([, label, href]) => `<a href="${href}" target="_blank" rel="noreferrer">${label}</a>`).join("<br>")}</td></tr>`).join("")}</tbody></table><p class="note">图片说明：当前卡片图片已替换为 Just One API 返回的小红书笔记封面图，并保留笔记来源链接。路线可执行性仍需 vendor 用实测轨迹确认。</p></div>`;
      renderCommunity();
    }

    function renderCommunity() {
      const total = Object.values(state.votes).reduce((sum, n) => sum + n, 0);
      el("community").innerHTML = `
        <div class="panel">
          <h2>投票结果</h2>
          <div class="poll">${data.routes.map(route => {
            const count = state.votes[route.id] || 0;
            const pct = total ? Math.round(count / total * 100) : 0;
            return `<div class="vote-card ${hasVoted(route.id) ? "voted" : ""}"><h3>${route.name}</h3><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><b>${count}票 · ${pct}%</b><p class="note">${route.fit}</p><button data-vote="${route.id}">${hasVoted(route.id) ? "取消投票" : "投一票"}</button></div>`;
          }).join("")}</div>
          <div class="comment-box">
            <select id="commentRoute">${data.routes.map(route => `<option value="${route.id}">${route.name}</option>`).join("")}</select>
            <input id="commentText" placeholder="写下你的顾虑、偏好或补充信息">
            <button id="addComment">发布评论</button>
          </div>
          <div id="comments">${state.comments.length ? state.comments.map(comment => {
            const route = data.routes.find(item => item.id === comment.route);
            return `<div class="comment"><b>${route ? route.name : "方案"}</b><p>${escapeHtml(comment.text)}</p><span class="note">${comment.time}</span></div>`;
          }).join("") : `<div class="empty">还没有评论。可以先投票，也可以写“担心太难”“更想有水”“不想两天一晚”之类的真实反馈。</div>`}</div>
        </div>`;
      document.querySelectorAll("#community [data-vote]").forEach(button => {
        button.addEventListener("click", () => {
          voteFor(button.dataset.vote);
        });
      });
      document.getElementById("addComment").addEventListener("click", () => {
        const text = document.getElementById("commentText").value.trim();
        const route = document.getElementById("commentRoute").value;
        if (!text) return;
        state.comments.unshift({ route, text, time: new Date().toLocaleString("zh-CN", { hour12: false }) });
        save();
        render();
        document.querySelector("[data-tab='community']").click();
      });
    }

    function wireTabs() {
      document.querySelectorAll("[data-tab]").forEach(button => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-tab]").forEach(tab => tab.classList.toggle("active", tab === button));
          document.querySelectorAll(".section").forEach(section => section.classList.toggle("active", section.id === button.dataset.tab));
        });
      });
    }

    function render() {
      el("recommendText").textContent = data.recommended;
      renderFilters();
      renderCards();
      renderCompare();
      renderTimeline();
      renderLists();
    }

    function showError(error) {
      const main = document.querySelector("main");
      main.insertAdjacentHTML("afterbegin", `<div class="error"><b>页面渲染遇到问题：</b>${escapeHtml(error.message || error)}。请刷新页面；如果仍然出现，把这个提示发给方案维护者。</div>`);
    }

    try {
      document.getElementById("pickRecommended").addEventListener("click", () => {
        state.selected = "shuiquan";
        state.filter = "全部";
        render();
      });
      render();
      wireTabs();
    } catch (error) {
      showError(error);
    }
  </script>
</body>
</html>
